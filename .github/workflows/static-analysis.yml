name: Static Analysis

on:
  push:
    branches: [main, master, 'feature/**', 'fix/**', 'refactor/**', 'infra/**']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install tools and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang-format \
            clang-tidy \
            cmake \
            cppcheck \
            libgl1-mesa-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            yamllint

      - name: YAML lint
        run: yamllint .github .yamllint.yml

      - name: Select project-owned source files
        run: |
          find include src tests \
            \( -path include/glad -o -path include/KHR -o -path include/nuklear \) -prune -o \
            \( -name '*.c' -o -name '*.h' -o -name '*.cpp' \) -type f -print \
            | grep -v '^src/glad\.c$' \
            | grep -v '^src/gldiagram/nuklear_backend\.c$' \
            | sort > analysis-files.txt

      - name: Format check
        run: |
          if [ -s analysis-files.txt ]; then
            xargs clang-format --dry-run --Werror < analysis-files.txt
          fi

      - name: Configure clang-tidy database
        run: cmake --preset debug

      - name: Clang-tidy
        run: |
          grep '\.c$' analysis-files.txt > clang-tidy-files.txt || true
          if [ -s clang-tidy-files.txt ]; then
            xargs clang-tidy --warnings-as-errors='*' -p build/debug < clang-tidy-files.txt
          fi

      - name: Cppcheck
        run: |
          grep '\.c$' analysis-files.txt > cppcheck-files.txt || true
          if [ -s cppcheck-files.txt ]; then
            cppcheck \
              --std=c11 \
              --enable=warning,performance,portability \
              --max-configs=1 \
              --quiet \
              --error-exitcode=1 \
              --file-list=cppcheck-files.txt \
              -I include \
              -I build/debug/generated/include
          fi

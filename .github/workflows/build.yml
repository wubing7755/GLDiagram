name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        build_type: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libgl1-mesa-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install cmake

    - name: Configure CMake
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        else
          cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        fi

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Test
      if: runner.os != 'Windows'
      working-directory: build
      # Note: --config is NOT needed for ctest with single-config generators (Unix Makefiles)
      # CMAKE_BUILD_TYPE was already set at configure time
      run: ctest --output-on-failure
